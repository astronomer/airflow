# Community Providers Registry
# ============================
#
# This file lists community-maintained Airflow providers that can be
# included in the Airflow Registry. To add your provider:
#
# 1. Fork this repository
# 2. Add your provider to this file following the format below
# 3. Submit a pull request
#
# Requirements:
# - Provider must be published on PyPI
# - Provider must follow Airflow provider conventions
# - Provider must have documentation
# - Provider must be actively maintained
#
# Format:
# - name: Display name of the provider
#   package_name: PyPI package name
#   description: Brief description (max 200 characters)
#   repository: GitHub repository URL
#   documentation: Documentation URL
#   maintainer: GitHub username or organization
#   tier: community (always "community" for submissions here)
#   categories: List of use case categories

providers: []
  # Example entry (uncomment to use as template):
  # - name: Example Provider
  #   package_name: airflow-provider-example
  #   description: Example integration for demonstration purposes
  #   repository: https://github.com/example/airflow-provider-example
  #   documentation: https://example.com/docs/airflow-provider
  #   maintainer: example-org
  #   tier: community
  #   categories:
  #     - data-processing
  #     - ml
