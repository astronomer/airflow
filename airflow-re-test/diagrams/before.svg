<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-before" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Before: Tight Coupling</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748b">API server must install all provider packages to render connection forms</text>

  <!-- API Server Box -->
  <rect x="220" y="90" width="360" height="200" rx="12" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">API Server</text>

  <!-- Inner: ProvidersManager -->
  <rect x="250" y="135" width="300" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" font-size="13" font-weight="500" fill="#334155">ProvidersManager (imports hook code)</text>

  <!-- Inner: Provider Packages -->
  <rect x="250" y="200" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="320" y="224" text-anchor="middle" font-size="11" fill="#475569">apache-airflow-</text>
  <text x="320" y="236" text-anchor="middle" font-size="11" fill="#475569">providers-google</text>

  <rect x="410" y="200" width="140" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="224" text-anchor="middle" font-size="11" fill="#475569">apache-airflow-</text>
  <text x="480" y="236" text-anchor="middle" font-size="11" fill="#475569">providers-amazon</text>

  <rect x="250" y="248" width="140" height="30" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="320" y="268" text-anchor="middle" font-size="11" fill="#475569">Custom Provider (Pokemon)</text>

  <rect x="410" y="248" width="140" height="30" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="268" text-anchor="middle" font-size="11" fill="#475569">... 100+ packages</text>

  <!-- Worker Box -->
  <rect x="260" y="370" width="280" height="60" rx="12" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="400" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Worker</text>
  <text x="400" y="418" text-anchor="middle" font-size="11" fill="#64748b">Same providers installed</text>

  <!-- Arrow: Worker to API Server -->
  <line x1="400" y1="370" x2="400" y2="295" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-before)"/>
  <text x="420" y="340" font-size="11" fill="#64748b">Runs tasks</text>

  <!-- Problems callout -->
  <rect x="30" y="350" width="200" height="120" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="130" y="374" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">Problems</text>
  <text x="40" y="396" font-size="11" fill="#7f1d1d">- All providers installed on</text>
  <text x="46" y="410" font-size="11" fill="#7f1d1d">  API server (100+ packages)</text>
  <text x="40" y="428" font-size="11" fill="#7f1d1d">- Hook code runs on control plane</text>
  <text x="40" y="446" font-size="11" fill="#7f1d1d">- No version flexibility</text>
  <text x="40" y="464" font-size="11" fill="#7f1d1d">- Re-couples what Airflow 3 split</text>

  <!-- Web UI -->
  <rect x="600" y="130" width="170" height="60" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="685" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Web UI</text>
  <text x="685" y="175" text-anchor="middle" font-size="11" fill="#64748b">Connection Forms</text>

  <!-- Arrow: API Server to Web UI -->
  <line x1="580" y1="160" x2="598" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-before)"/>
  <text x="570" y="147" font-size="10" fill="#64748b">Hook metadata</text>
</svg>
