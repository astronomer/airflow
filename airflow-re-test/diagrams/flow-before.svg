<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fa" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Before: How Connection Forms Are Loaded</text>

  <!-- Step boxes -->
  <!-- 1. pip install -->
  <rect x="50" y="80" width="200" height="70" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">1. Deploy API Server</text>
  <text x="150" y="125" text-anchor="middle" font-size="11" fill="#64748b">pip install all 100+</text>
  <text x="150" y="139" text-anchor="middle" font-size="11" fill="#64748b">provider packages</text>

  <!-- Arrow -->
  <line x1="250" y1="115" x2="300" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- 2. ProvidersManager -->
  <rect x="305" y="80" width="230" height="70" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="420" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">2. On Startup</text>
  <text x="420" y="125" text-anchor="middle" font-size="11" fill="#64748b">ProvidersManager imports</text>
  <text x="420" y="139" text-anchor="middle" font-size="11" fill="#64748b">all hook classes from packages</text>

  <!-- Arrow -->
  <line x1="535" y1="115" x2="585" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- 3. Execute hook code -->
  <rect x="590" y="80" width="260" height="70" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="720" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">3. Load Hook Metadata</text>
  <text x="720" y="125" text-anchor="middle" font-size="11" fill="#64748b">Calls get_ui_field_behaviour()</text>
  <text x="720" y="139" text-anchor="middle" font-size="11" fill="#64748b">on every hook class (runs code)</text>

  <!-- Arrow down -->
  <line x1="720" y1="150" x2="720" y2="195" stroke="#334155" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- 4. Store in memory -->
  <rect x="590" y="200" width="260" height="55" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="720" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">4. Cache Metadata</text>
  <text x="720" y="242" text-anchor="middle" font-size="11" fill="#64748b">Store connection fields in memory</text>

  <!-- Arrow left -->
  <line x1="590" y1="228" x2="540" y2="228" stroke="#334155" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- 5. UI request -->
  <rect x="305" y="200" width="230" height="55" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="420" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">5. Serve to UI</text>
  <text x="420" y="242" text-anchor="middle" font-size="11" fill="#64748b">GET /ui/connections/hook-metadata</text>

  <!-- Arrow left -->
  <line x1="305" y1="228" x2="255" y2="228" stroke="#334155" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- 6. Render form -->
  <rect x="50" y="200" width="200" height="55" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="150" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">6. Render Form</text>
  <text x="150" y="242" text-anchor="middle" font-size="11" fill="#64748b">UI renders connection fields</text>

  <!-- Separator -->
  <line x1="50" y1="290" x2="850" y2="290" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Problems section -->
  <text x="450" y="320" text-anchor="middle" font-size="16" font-weight="600" fill="#b91c1c">Problems with This Approach</text>

  <!-- Problem 1 -->
  <rect x="50" y="345" width="250" height="90" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="175" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Tight Coupling</text>
  <text x="175" y="390" text-anchor="middle" font-size="11" fill="#7f1d1d">API server must install every</text>
  <text x="175" y="405" text-anchor="middle" font-size="11" fill="#7f1d1d">provider package. Adding a new</text>
  <text x="175" y="420" text-anchor="middle" font-size="11" fill="#7f1d1d">provider = redeploy API server.</text>

  <!-- Problem 2 -->
  <rect x="325" y="345" width="250" height="90" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="450" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Security Risk</text>
  <text x="450" y="390" text-anchor="middle" font-size="11" fill="#7f1d1d">Hook code executes on the</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#7f1d1d">control plane. User-authored</text>
  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#7f1d1d">code runs in a privileged context.</text>

  <!-- Problem 3 -->
  <rect x="600" y="345" width="250" height="90" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="725" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">No Version Flexibility</text>
  <text x="725" y="390" text-anchor="middle" font-size="11" fill="#7f1d1d">All workers must use the same</text>
  <text x="725" y="405" text-anchor="middle" font-size="11" fill="#7f1d1d">provider version. Can't support</text>
  <text x="725" y="420" text-anchor="middle" font-size="11" fill="#7f1d1d">heterogeneous worker fleets.</text>

  <!-- Flow label -->
  <rect x="50" y="460" width="800" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="485" text-anchor="middle" font-size="12" font-weight="500" fill="#991b1b">Airflow 3.0 decoupled providers from core, but this approach re-couples them at the API server layer</text>
</svg>
