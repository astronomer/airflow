---
name: Build & Publish Registry
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      destination:
        description: "Publish to live or staging S3 bucket"
        required: true
        type: choice
        options:
          - staging
          - live
        default: staging
  workflow_call:
    inputs:
      destination:
        description: "Publish to live or staging S3 bucket"
        required: false
        type: string
        default: staging
    secrets:
      DOCS_AWS_ACCESS_KEY_ID:
        required: true
      DOCS_AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  contents: read

jobs:
  build-and-publish-registry:
    timeout-minutes: 30
    name: "Build & Publish Registry"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: >
      github.event_name == 'workflow_call' ||
      contains(fromJSON('[
        "ashb",
        "bugraoz93",
        "eladkal",
        "ephraimbuddy",
        "jedcunningham",
        "jscheffl",
        "kaxil",
        "pierrejeambrun",
        "shahar1",
        "potiuk",
        "utkarsharma2",
        "vincbeck"
        ]'), github.event.sender.login)
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: "Install Python dependencies"
        run: pip install pyyaml

      - name: "Setup pnpm"
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.0.0
        with:
          version: 9

      - name: "Setup Node.js"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'registry/pnpm-lock.yaml'

      - name: "Extract registry metadata"
        run: python dev/registry/extract_metadata.py

      - name: "Install Node.js dependencies"
        working-directory: registry
        run: pnpm install --frozen-lockfile

      - name: "Build registry site"
        working-directory: registry
        env:
          REGISTRY_PATH_PREFIX: "/registry/"
        run: pnpm build

      - name: "Upload registry artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: registry-site
          path: registry/_site
          retention-days: 7
          if-no-files-found: error

      - name: "Install AWS CLI v2"
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          rm /tmp/awscliv2.zip
          sudo /tmp/aws/install --update
          rm -rf /tmp/aws/

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a  # v4.0.1
        with:
          aws-access-key-id: ${{ secrets.DOCS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DOCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: "Determine S3 destination"
        id: destination
        env:
          DESTINATION: ${{ inputs.destination || 'staging' }}
        run: |
          if [[ "${DESTINATION}" == "live" ]]; then
            echo "bucket=s3://live-docs-airflow-apache-org/registry/" >> "${GITHUB_OUTPUT}"
          else
            echo "bucket=s3://staging-docs-airflow-apache-org/registry/" >> "${GITHUB_OUTPUT}"
          fi
          echo "Publishing registry to ${DESTINATION}"

      - name: "Sync registry to S3"
        env:
          S3_BUCKET: ${{ steps.destination.outputs.bucket }}
        run: |
          aws s3 sync registry/_site/ "${S3_BUCKET}" \
            --delete \
            --cache-control "public, max-age=300"
